<!DOCTYPE html>
<html lang="en-CA">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <link href="style.css" rel="stylesheet">
    <script src="config.js" defer></script>
    <script src="script.js" defer></script>
    <title>Weather</title>
</head>

<body>
    <header>
        <h1>Weather</h1>
    </header>

    <main>
        <form>
            <label for="city" class="sr-only">Search Weather</label>
            <input id="city" name="city" placeholder="Enter city name..." required>
            <button>Search</button>
        </form>

        <div class="weather"><!-- render current weather --></div>
    </main>

    <footer>
        <small>Weather data provided by <a href="https://openweathermap.org/appid" target="_blank"
               rel="noreferrer">OpenWeather</a></small>
    </footer>
</body>

</html>
